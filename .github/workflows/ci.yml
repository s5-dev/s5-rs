name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # RUSTFLAGS lives in flake.nix — setting it here would be silently shadowed
  # the moment a step runs `nix develop --command`. RUSTDOCFLAGS is fine here
  # because the flake doesn't override it.
  RUSTDOCFLAGS: -Dwarnings
  SCCACHE_CACHE_SIZE: "10G"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@main
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache backend
        shell: bash
        run: |
          # On real GHA, ACTIONS_CACHE_URL is exported by sccache-action above
          # and we want sccache to use it. Under nektos/act, that URL doesn't
          # exist, so leave SCCACHE_GHA_ENABLED unset and sccache falls back
          # to its default local-disk cache.
          if [ -z "${ACT:-}" ]; then
            echo "SCCACHE_GHA_ENABLED=on" >> "$GITHUB_ENV"
          fi

      - name: Check formatting
        run: nix develop --command cargo fmt --all -- --check

      - name: Lint (Clippy)
        run: nix develop --command cargo clippy --workspace --all-targets

      - name: Build
        run: nix develop --command cargo build --workspace --locked --verbose

      - name: Run Tests (Nextest)
        run: nix develop --command cargo nextest run --workspace --locked --retries 5

      - name: Run Doctests
        run: nix develop --command cargo test --workspace --doc --locked

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: cargo deny check
        # cargo deny doesn't compile anything; bypass sccache entirely so it
        # doesn't try to spin up a backend (and so this job stays fast under
        # act, where the GHA cache backend isn't reachable).
        run: nix develop --command env -u RUSTC_WRAPPER cargo deny --workspace check
