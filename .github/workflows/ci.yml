name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # RUSTFLAGS lives in flake.nix — setting it here would be silently shadowed
  # the moment a step runs `nix develop --command`. RUSTDOCFLAGS is fine here
  # because the flake doesn't override it.
  RUSTDOCFLAGS: -Dwarnings
  SCCACHE_GHA_ENABLED: "on"
  SCCACHE_CACHE_SIZE: "10G"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@main
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Check formatting
        run: nix develop --command cargo fmt --all -- --check

      - name: Lint (Clippy)
        run: nix develop --command cargo clippy --workspace --all-targets

      - name: Build
        run: nix develop --command cargo build --workspace --locked --verbose

      - name: Run Tests (Nextest)
        run: nix develop --command cargo nextest run --workspace --locked --retries 5

      - name: Run Doctests
        run: nix develop --command cargo test --workspace --doc --locked

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: cargo deny check
        run: nix develop --command cargo deny --workspace check
