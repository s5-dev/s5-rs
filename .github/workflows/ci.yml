name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@main
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: nix develop --command cargo fmt --all -- --check

      - name: Lint (Clippy)
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: nix develop --command cargo build --workspace --locked --verbose

      - name: Run Tests (Nextest)
        run: nix develop --command cargo nextest run --workspace --locked --retries 5

      - name: Run Doctests
        run: nix develop --command cargo test --workspace --doc --locked
