# cargo-deny config. Run locally with:
#   nix shell nixpkgs#cargo-deny --command cargo deny --workspace check

[bans]
# A clean dep tree without duplicates is nice but not the hill to die on
# right now. Revisit once `cargo tree --duplicates` is short enough to
# meaningfully hand-prune.
multiple-versions = "allow"

[licenses]
# Permissive licenses we are willing to bundle. Add new ones here only after
# confirming compatibility with the project's licensing (this crate is
# dual-licensed Apache-2.0 / MIT — see Cargo.toml).
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BlueOak-1.0.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[advisories]
# Each entry must be triaged and either fixed or justified. Newly-published
# advisories on other crates will fail CI immediately, which is the point.
ignore = [
  "RUSTSEC-2021-0154", # tracked: not yet evaluated
  "RUSTSEC-2023-0040", # tracked: not yet evaluated
  "RUSTSEC-2023-0089", # tracked: not yet evaluated
  "RUSTSEC-2024-0370", # tracked: not yet evaluated
  "RUSTSEC-2024-0384", # tracked: not yet evaluated
  "RUSTSEC-2024-0388", # tracked: not yet evaluated
  "RUSTSEC-2024-0436", # tracked: not yet evaluated
  "RUSTSEC-2025-0040", # users v0.11.0 via fuser — unmaintained, no upstream fix
  "RUSTSEC-2025-0057", # tracked: not yet evaluated
  "RUSTSEC-2025-0119", # tracked: not yet evaluated
  "RUSTSEC-2026-0097", # tracked: not yet evaluated
  "RUSTSEC-2026-0098", # tracked: not yet evaluated
  "RUSTSEC-2026-0099", # tracked: not yet evaluated
  "RUSTSEC-2026-0104", # tracked: not yet evaluated
  "RUSTSEC-2026-0173", # proc-macro-error2 unmaintained; build-time only, via age -> i18n-embed-fl, no upstream fix
  "RUSTSEC-2026-0194", # quick-xml <0.41 quadratic attr check; transitively pinned by rust-s3 0.37 and plist (iroh), no bump path yet
  "RUSTSEC-2026-0195", # quick-xml <0.41 namespace-decl DoS; same transitive pins as RUSTSEC-2026-0194
]

[sources]
# All deps must come from crates.io. Loosen if a git dep becomes necessary.
allow-git = []
