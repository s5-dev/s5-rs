[package]
name = "vup_cli"
version = "1.0.0-beta.1"
edition = "2024"
description = "Personal backup, sync, and archive tool built on S5"
license = "MIT OR Apache-2.0"

[[bin]]
name = "vup"
path = "src/main.rs"

[lib]
name = "vup_cli"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0.100"
chrono = "0.4"
clap = { version = "4.5.51", features = ["derive"] }
clap-verbosity-flag = { version = "3", default-features = false, features = ["tracing"] }
dialoguer = "0.11"
directories = "6.0.0"
humansize = "2"
s5_client = { workspace = true, features = ["std"] }
s5_fs.workspace = true
s5_importer_local.workspace = true
serde.workspace = true
tokio = { version = "1.48.0", features = ["full"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
blake3 = "1.8"
tempfile = "3"
tokio = { version = "1.48.0", features = ["full"] }
s5_compression = { path = "../s5_compression" }
s5_fs.workspace = true
